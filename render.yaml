# Render Blueprint — one-click deploy for the Fundamental Terminal
# Deploy: https://render.com/deploy?repo=https://github.com/shivamsinghchauhan18/Fundamental-Analysis
#
# Provisions:
#   - A managed PostgreSQL instance (free tier; auto-expires after 90 days)
#   - One web service running the FastAPI dashboard via Docker
#
# Seeding (free-tier compatible):
#   The dashboard's FastAPI lifespan hook runs orchestrator/orchestrator.py
#   on first boot if the DB is empty, populating the TSLA/NVDA/PLTR
#   analytics tables that back STAT / CORRP / MACRO / MC / GRAPHP / PEER /
#   EVTS. On warm boots the seed step is skipped (idempotent count check).
#   This replaces preDeployCommand, which Render disallows on free tier.
#
# Port binding:
#   Dockerfile's CMD uses shell-form `uvicorn ... --port ${PORT:-8000}`,
#   so $PORT (injected by Render) is honored. startCommand is not used
#   because Render's free Docker services disallow it.
#
# Free-tier caveats to share with students:
#   - Web service sleeps after 15 min of inactivity; first request after a
#     sleep takes ~30-60 s while the container cold-starts. The very first
#     deploy adds ~10-20 s on top for the seed.
#   - Free PostgreSQL is deleted after 90 days. Re-deploy (or upgrade the
#     plan) before the expiry to keep data persistent.

databases:
  - name: fundamental-db
    plan: free
    databaseName: fundamental_db
    user: fundamental_user

services:
  - type: web
    name: fundamental-terminal
    runtime: docker
    plan: free
    dockerfilePath: ./agents/dashboard/Dockerfile
    dockerContext: .
    healthCheckPath: /api/market-status
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fundamental-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
