services:
  db:
    image: postgres:15-alpine
    container_name: fundamental_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fundamental_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fundamental_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: agent_orchestrator
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fundamental_db
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  visualization-dashboard:
    build:
      context: .
      dockerfile: agents/dashboard/Dockerfile
    container_name: fundamental_terminal
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fundamental_db
    depends_on:
      db:
        condition: service_healthy
      orchestrator:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
